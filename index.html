<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Widgets</title>
  <meta name="description" content="Minimalist embeddable widgets for Notion — focus timer, daily wins, and more.">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #191919;
      --surface: rgba(255, 255, 255, 0.05);
      --border: #242428;
      --text: #ffffff;
      --muted: #5a5a62;
      --accent: #e8c97a;
    }

    :root.light {
      --bg: #ffffff;
      --surface: rgba(0, 0, 0, 0.03);
      --border: #e2e0db;
      --text: #1a1a1a;
      --muted: #8a8a8e;
      --accent: #c4943a;
    }

    html {
      background: var(--bg);
      transition: background-color 0.4s ease;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      transition: color 0.4s ease;
    }

    .page {
      max-width: 480px;
      width: 100%;
      padding: 3rem 2rem;
    }

    /* ── Header ── */

    .header {
      text-align: center;
      margin-bottom: 3rem;
      position: relative;
      animation: fade-in 0.5s ease both;
    }

    .logo {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1.6rem;
      font-weight: 200;
      color: var(--text);
      line-height: 1.3;
      letter-spacing: -0.01em;
    }

    .btn-theme {
      position: absolute;
      top: 0;
      right: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .btn-theme:hover {
      color: var(--text);
      border-color: var(--muted);
    }

    .btn-theme svg { pointer-events: none; }

    /* ── Catalogue ── */

    .catalogue {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 1.4rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      text-decoration: none;
      color: inherit;
      transition: border-color 0.25s ease, background 0.25s ease, transform 0.15s ease;
    }

    .card:nth-child(1) { animation: fade-in 0.5s ease 0.1s both; }
    .card:nth-child(2) { animation: fade-in 0.5s ease 0.2s both; }

    .card:hover {
      border-color: var(--accent);
    }

    .card:active {
      transform: scale(0.99);
    }

    .card-icon {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }

    .card-body {
      flex: 1;
      min-width: 0;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 400;
      margin-bottom: 0.3rem;
    }

    .card-desc {
      font-size: 0.8rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.4;
      margin-bottom: 0.6rem;
    }

    .card-tags {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.2rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      transition: border-color 0.25s ease;
    }

    .card:hover .tag {
      border-color: var(--muted);
    }

    .card-arrow {
      flex-shrink: 0;
      color: var(--muted);
      transition: color 0.25s ease, transform 0.25s ease;
    }

    .card:hover .card-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    .card-arrow svg { pointer-events: none; }

    /* ── Footer ── */

    .footer {
      margin-top: 3rem;
      text-align: center;
      animation: fade-in 0.5s ease 0.3s both;
    }

    .footer-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .footer-link:hover { color: var(--text); }
    .footer-link svg { pointer-events: none; }

    /* ── Animation ── */

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */

    @media (max-width: 480px) {
      .page { padding: 2rem 1.2rem; }
      .card { padding: 1.1rem 1rem; }
      .tagline { font-size: 1.3rem; }
    }

    @media (max-width: 300px) {
      .page { padding: 1rem; }
      .card-tags { display: none; }
      .card-icon { display: none; }
    }
  </style>
</head>
<body>

<div class="page">

  <header class="header">
    <h1 class="logo">Notion Widgets</h1>
    <p class="tagline">Embeddable tools for your workspace</p>
    <button class="btn-theme" aria-label="Toggle theme">
      <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <main class="catalogue">

    <a href="/focus-timer/" class="card">
      <div class="card-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12,6 12,12 16,14"/>
        </svg>
      </div>
      <div class="card-body">
        <h2 class="card-title">Focus Timer</h2>
        <p class="card-desc">Pomodoro timer with circular progress, multiple modes, and audio alerts.</p>
        <div class="card-tags">
          <span class="tag">Pomodoro</span>
          <span class="tag">4 Modes</span>
          <span class="tag">Audio</span>
        </div>
      </div>
      <span class="card-arrow">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9,18 15,12 9,6"/>
        </svg>
      </span>
    </a>

    <a href="/daily-wins/" class="card">
      <div class="card-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="4"/>
          <polyline points="8,12 11,15 16,9"/>
        </svg>
      </div>
      <div class="card-body">
        <h2 class="card-title">Daily Wins</h2>
        <p class="card-desc">Track daily accomplishments with satisfying animations and local persistence.</p>
        <div class="card-tags">
          <span class="tag">Checklist</span>
          <span class="tag">Animations</span>
          <span class="tag">Persistent</span>
        </div>
      </div>
      <span class="card-arrow">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9,18 15,12 9,6"/>
        </svg>
      </span>
    </a>

  </main>

  <footer class="footer">
    <a href="https://github.com/elprofesor96/notion" class="footer-link" target="_blank" rel="noopener noreferrer">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
      <span>Source</span>
    </a>
  </footer>

</div>

<script>
;(function () {
  'use strict';

  var btn = document.querySelector('.btn-theme');
  var sun = btn.querySelector('.icon-sun');
  var moon = btn.querySelector('.icon-moon');

  function applyTheme(light) {
    document.documentElement.classList.toggle('light', light);
    sun.style.display = light ? 'none' : '';
    moon.style.display = light ? '' : 'none';
    try { localStorage.setItem('catalogue-theme', light ? 'light' : 'dark'); } catch (e) { /* private browsing */ }
  }

  var saved = null;
  try { saved = localStorage.getItem('catalogue-theme'); } catch (e) { /* private browsing */ }
  applyTheme(saved === 'light');

  btn.addEventListener('click', function () {
    applyTheme(!document.documentElement.classList.contains('light'));
  });
})();
</script>

</body>
</html>
