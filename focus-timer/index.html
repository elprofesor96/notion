<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f6;
      --surface: #ffffff;
      --border: #e2e0db;
      --text: #1a1a1a;
      --muted: #8a8a8e;
      --accent: #c4943a;
      --accent-focus: #c4943a;
      --accent-break: #4a9ebb;
      --accent-long: #7a5abb;
      --ring-track: #eae8e3;
      --font-display: 'Fraunces', serif;
      --font-mono: 'DM Mono', monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0c0c0e;
        --surface: #141416;
        --border: #242428;
        --text: #ffffff;
        --muted: #5a5a62;
        --accent: #e8c97a;
        --accent-focus: #e8c97a;
        --accent-break: #7ac4e8;
        --accent-long: #a07ae8;
        --ring-track: #1e1e22;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.6s ease;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 400px;
      width: 100%;
      padding: 2rem;
      animation: fade-in 0.5s ease;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Mode tabs */
    .modes {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .modes button {
      padding: 0.45rem 1rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      background: transparent;
      border: none;
      border-right: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .modes button:last-child { border-right: none; }

    .modes button.active {
      color: var(--bg);
      font-weight: 500;
      background: var(--accent);
    }

    /* Sessions counter */
    .sessions {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 1.5rem;
    }

    /* Ring */
    .ring {
      position: relative;
      width: 220px;
      height: 220px;
      margin-bottom: 2rem;
    }

    .ring svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-track {
      fill: none;
      stroke: var(--ring-track);
      stroke-width: 2;
    }

    .ring-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke 0.4s ease;
    }

    .ring-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .time {
      font-family: var(--font-display);
      font-size: 3.2rem;
      font-weight: 200;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
      transition: color 0.4s ease, opacity 0.3s ease;
    }

    .label {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .btn-play {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .btn-play:active { transform: scale(0.95); }

    .btn-play.playing {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .btn-reset {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .btn-reset:hover { color: var(--text); border-color: var(--muted); }
    .btn-reset:active { transform: scale(0.95); }

    svg.icon { pointer-events: none; }

    /* Completion pulse */
    @keyframes bg-pulse {
      0%   { background-color: var(--bg); }
      50%  { background-color: var(--surface); }
      100% { background-color: var(--bg); }
    }

    body.pulse { animation: bg-pulse 0.8s ease; }

    /* Mode fade */
    .time.switching { opacity: 0.3; }

    @media (max-width: 300px) {
      .ring { width: 180px; height: 180px; }
      .time { font-size: 2.6rem; }
      .container { padding: 1rem; }
    }
  </style>
</head>
<body>

<div class="container" data-mode="focus">

  <nav class="modes">
    <button class="active" data-mode="focus">Focus</button>
    <button data-mode="break">Break</button>
    <button data-mode="long">Long</button>
  </nav>

  <span class="sessions">0 sessions</span>

  <div class="ring">
    <svg viewBox="0 0 200 200">
      <circle class="ring-track" cx="100" cy="100" r="88" />
      <circle class="ring-progress" cx="100" cy="100" r="88" />
    </svg>
    <div class="ring-inner">
      <div class="time">25:00</div>
      <div class="label">focus session</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-reset" aria-label="Reset">
      <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    </button>
    <button class="btn-play" aria-label="Start">
      <svg class="icon play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="6,3 20,12 6,21"/>
      </svg>
      <svg class="icon pause-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none">
        <rect x="6" y="4" width="4" height="16" rx="1"/>
        <rect x="14" y="4" width="4" height="16" rx="1"/>
      </svg>
    </button>
    <button class="btn-reset" style="visibility:hidden" aria-hidden="true">
      <!-- spacer for centering -->
    </button>
  </div>

</div>

<script>
;(function () {
  'use strict';

  // ── Config ──
  var MODES = {
    focus: { label: 'focus session', minutes: 25, accent: '--accent-focus' },
    break: { label: 'short break',  minutes: 5,  accent: '--accent-break' },
    long:  { label: 'long break',   minutes: 15, accent: '--accent-long'  },
  };

  // ── DOM ──
  var container  = document.querySelector('.container');
  var timeEl     = container.querySelector('.time');
  var labelEl    = container.querySelector('.label');
  var sessionsEl = container.querySelector('.sessions');
  var ring       = container.querySelector('.ring-progress');
  var playBtn    = container.querySelector('.btn-play');
  var playIcon   = container.querySelector('.play-icon');
  var pauseIcon  = container.querySelector('.pause-icon');
  var resetBtn   = container.querySelector('.btn-reset');
  var modeBtns   = container.querySelectorAll('.modes button');

  // ── Ring math ──
  var R = 88;
  var CIRC = 2 * Math.PI * R;
  ring.style.strokeDasharray = CIRC;
  ring.style.strokeDashoffset = 0;

  // ── State ──
  var mode = 'focus';
  var totalSecs = MODES.focus.minutes * 60;
  var remaining = totalSecs;
  var running = false;
  var interval = null;
  var sessionCount = 0;
  var audioCtx = null;

  // ── Audio ──
  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function chime() {
    ensureAudio();
    [660, 784, 988].forEach(function (freq, i) {
      setTimeout(function () {
        var osc = audioCtx.createOscillator();
        var g = audioCtx.createGain();
        osc.connect(g);
        g.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0.3, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
      }, i * 180);
    });
  }

  // ── Formatting ──
  function formatTime(s) {
    var m = Math.floor(s / 60).toString().padStart(2, '0');
    var sec = (s % 60).toString().padStart(2, '0');
    return m + ':' + sec;
  }

  // ── Render ──
  function render() {
    timeEl.textContent = formatTime(remaining);
    document.title = formatTime(remaining) + ' \u2014 Focus Timer';
    var pct = remaining / totalSecs;
    ring.style.strokeDashoffset = CIRC * (1 - pct);
    sessionsEl.textContent = sessionCount + ' session' + (sessionCount !== 1 ? 's' : '');
  }

  function applyAccent() {
    var accentVar = MODES[mode].accent;
    var style = getComputedStyle(document.documentElement);
    var color = style.getPropertyValue(accentVar).trim();
    document.documentElement.style.setProperty('--accent', color);
  }

  function setMode(newMode) {
    if (running) pause();
    mode = newMode;
    container.setAttribute('data-mode', mode);
    totalSecs = MODES[mode].minutes * 60;
    remaining = totalSecs;
    labelEl.textContent = MODES[mode].label;
    applyAccent();

    // Update active tab
    modeBtns.forEach(function (btn) {
      btn.classList.toggle('active', btn.dataset.mode === mode);
    });

    // Brief fade on time display
    timeEl.classList.add('switching');
    setTimeout(function () { timeEl.classList.remove('switching'); }, 150);

    playBtn.classList.remove('playing');
    playIcon.style.display = '';
    pauseIcon.style.display = 'none';
    render();
  }

  // ── Timer controls ──
  function start() {
    ensureAudio();
    running = true;
    playBtn.classList.add('playing');
    playIcon.style.display = 'none';
    pauseIcon.style.display = '';
    interval = setInterval(tick, 1000);
  }

  function pause() {
    running = false;
    playBtn.classList.remove('playing');
    playIcon.style.display = '';
    pauseIcon.style.display = 'none';
    clearInterval(interval);
  }

  function toggle() {
    running ? pause() : start();
  }

  function reset() {
    pause();
    remaining = totalSecs;
    render();
  }

  function tick() {
    remaining--;
    if (remaining <= 0) {
      remaining = 0;
      render();
      complete();
      return;
    }
    render();
  }

  function complete() {
    pause();
    if (mode === 'focus') {
      sessionCount++;
      chime();
    }
    // Body pulse
    document.body.classList.remove('pulse');
    void document.body.offsetWidth;
    document.body.classList.add('pulse');

    // Auto-switch
    if (mode === 'focus') {
      setMode(sessionCount % 4 === 0 ? 'long' : 'break');
    } else {
      setMode('focus');
    }
  }

  // ── Events ──
  playBtn.addEventListener('click', toggle);
  resetBtn.addEventListener('click', reset);

  modeBtns.forEach(function (btn) {
    btn.addEventListener('click', function () {
      setMode(btn.dataset.mode);
    });
  });

  // ── Init ──
  applyAccent();
  render();
})();
</script>
</body>
</html>
